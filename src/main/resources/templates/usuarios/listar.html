<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Usuarios</title>
</head>
<body>

<h1>Listado de Usuarios</h1>

<a th:href="@{/usuarios/agregar}">Agregar usuario</a>

<br><br>

<table border="1">
    <thead>
    <tr>
        <th>Cédula</th>
        <th>Nombre</th>
        <th>Email</th>
        <th>Acciones</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="usuario : ${usuarios}">
        <td th:text="${usuario.cedula}"></td>
        <td th:text="${usuario.nombre}"></td>
        <td th:text="${usuario.email}"></td>
        <td>
            <a th:href="@{/usuarios/editar/{cedula}(cedula=${usuario.cedula})}">Editar</a>
            |
            <a th:href="@{/usuarios/eliminar/{cedula}(cedula=${usuario.cedula})}"
               onclick="return confirm('¿Está seguro de eliminar este usuario?')">
                Eliminar
            </a>
        </td>
    </tr>
    </tbody>
</table>

<br>

<a th:href="@{/}">Volver al inicio</a>

</body>
</html>
