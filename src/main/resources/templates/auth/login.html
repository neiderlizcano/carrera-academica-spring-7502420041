<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inicio de sesión</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div class="barra-superior">
    <a th:href="@{/login}">Iniciar sesión</a>
    <a th:href="@{/recuperar}">Recuperar contraseña</a>
</div>

<div class="hero">
    <h1>Inicio de sesión</h1>
    <p>Accede para administrar el sistema</p>
</div>

<div class="contenedor-principal">
    <div class="tarjeta">

        <div class="alerta" th:if="${error}" th:text="${error}">
            Correo o contraseña incorrectos.
        </div>

        <div class="alerta-exito" th:if="${mensaje}" th:text="${mensaje}">
            Mensaje de éxito.
        </div>

        <form th:action="@{/login}" method="post">

            <div class="grupo-formulario">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="grupo-formulario">
                <label for="clave">Contraseña</label>
                <input type="password" id="clave" name="clave" required>
            </div>

            <div class="botones">
                <button class="boton boton-azul" type="submit">Iniciar sesión</button>
                <a class="boton boton-verde" th:href="@{/recuperar}">
                    Recuperar contraseña
                </a>
            </div>

        </form>

    </div>
</div>

</body>
</html>
