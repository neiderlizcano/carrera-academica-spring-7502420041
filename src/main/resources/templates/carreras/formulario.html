<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Carrera Académica</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div class="barra-superior">
    <a th:href="@{/}">Inicio</a>
    <a th:href="@{/usuarios}">Usuarios</a>
    <a th:href="@{/carreras}">Carreras académicas</a>
    <a th:href="@{/carreras/agregar}">Registrar carrera</a>
    <a th:href="@{/logout}">Cerrar sesión</a>
</div>

<div class="hero">
    <h1>Formulario de Carrera Académica</h1>
    <p>Registra o actualiza la información del programa académico</p>
</div>

<div class="contenedor-principal">
    <div class="tarjeta">

        <div class="alerta">
            Complete todos los datos requeridos de la carrera académica.
        </div>

        <form th:action="@{/carreras/guardar}" th:object="${carrera}" method="post">

            <input type="hidden" th:field="*{id}">

            <div class="grupo-formulario">
                <label for="nombre">Nombre de la carrera</label>
                <input type="text" id="nombre" th:field="*{nombre}">
                <div class="error-campo" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
            </div>

            <div class="grupo-formulario">
                <label for="numCreditos">Número de créditos</label>
                <input type="number" id="numCreditos" th:field="*{numCreditos}">
                <div class="error-campo" th:if="${#fields.hasErrors('numCreditos')}" th:errors="*{numCreditos}"></div>
            </div>

            <div class="grupo-formulario">
                <label for="numAsignaturas">Número de asignaturas</label>
                <input type="number" id="numAsignaturas" th:field="*{numAsignaturas}">
                <div class="error-campo" th:if="${#fields.hasErrors('numAsignaturas')}" th:errors="*{numAsignaturas}"></div>
            </div>

            <div class="grupo-formulario">
                <label for="numSemestres">Número de semestres</label>
                <input type="number" id="numSemestres" th:field="*{numSemestres}">
                <div class="error-campo" th:if="${#fields.hasErrors('numSemestres')}" th:errors="*{numSemestres}"></div>
            </div>

            <div class="grupo-formulario">
                <label for="nivelFormacion">Nivel de formación</label>
                <input type="text" id="nivelFormacion" th:field="*{nivelFormacion}">
                <div class="error-campo" th:if="${#fields.hasErrors('nivelFormacion')}" th:errors="*{nivelFormacion}"></div>
            </div>

            <div class="grupo-formulario">
                <label for="titulo">Título otorgado</label>
                <input type="text" id="titulo" th:field="*{titulo}">
                <div class="error-campo" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}"></div>
            </div>

            <div class="grupo-formulario">
                <label for="valorSemestre">Valor del semestre</label>
                <input type="number" step="0.01" id="valorSemestre" th:field="*{valorSemestre}">
                <div class="error-campo" th:if="${#fields.hasErrors('valorSemestre')}" th:errors="*{valorSemestre}"></div>
            </div>

            <div class="grupo-formulario">
                <label for="universidad">Universidad</label>
                <input type="text" id="universidad" th:field="*{universidad}">
                <div class="error-campo" th:if="${#fields.hasErrors('universidad')}" th:errors="*{universidad}"></div>
            </div>

            <div class="grupo-formulario">
                <label for="esAcreditada">¿Es acreditada?</label>
                <select id="esAcreditada" th:field="*{esAcreditada}">
                    <option value="">Seleccione una opción</option>
                    <option th:value="true">Sí</option>
                    <option th:value="false">No</option>
                </select>
                <div class="error-campo" th:if="${#fields.hasErrors('esAcreditada')}" th:errors="*{esAcreditada}"></div>
            </div>

            <div class="grupo-formulario">
                <label for="perfiles">Perfiles</label>
                <textarea id="perfiles" th:field="*{perfiles}" rows="4"></textarea>
                <div class="error-campo" th:if="${#fields.hasErrors('perfiles')}" th:errors="*{perfiles}"></div>
            </div>

            <div class="grupo-formulario">
                <label for="areaConocimiento">Área de conocimiento</label>
                <input type="text" id="areaConocimiento" th:field="*{areaConocimiento}">
                <div class="error-campo" th:if="${#fields.hasErrors('areaConocimiento')}" th:errors="*{areaConocimiento}"></div>
            </div>

            <div class="botones">
                <button class="boton boton-azul" type="submit">Guardar</button>
                <a class="boton boton-verde" th:href="@{/carreras}">Volver al listado</a>
            </div>

        </form>

    </div>
</div>

</body>
</html>
